repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: ['--markdown-linebreak-ext=md']
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: ['--config', '.markdownlint.json']

  - repo: local
    hooks:
      - id: pii-check
        name: Personal Information Check
        entry: scripts/pii-check.sh
        language: script
        types: [text]
        exclude: '^\.pre-commit-config\.yaml$|^scripts/pii-check\.sh$|^scripts/pii-patterns\.txt$|^scripts/names-blocklist\.txt$|^scripts/allowlist\.txt$'
      - id: pii-check-commit-msg
        name: PII Check in Commit Message
        entry: scripts/pii-check.sh
        language: script
        stages: [commit-msg]
        always_run: true
